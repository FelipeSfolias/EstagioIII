{% extends "base.html" %}
{% load static %}

{% block title %}Editar projeto #{{ projeto.id }}{% endblock %}
{% block topbar %}{% endblock %}

{% block content %}
<div class="form">
  <h2>Editar projeto #{{ projeto.id }}</h2>

  <form method="post">
    {% csrf_token %}

    <div class="form-grid">
      <div class="fg">
        <label for="id_titulo">Título</label>
        <input type="text" id="id_titulo" name="titulo"
               value="{{ projeto.titulo }}" required>
      </div>

      <div class="fg">
        <label for="id_responsavel">Responsável</label>
        <input type="text" id="id_responsavel" name="responsavel"
               value="{{ projeto.responsavel }}">
      </div>

      <div class="fg">
        <label for="id_area">Área</label>
        <input type="text" id="id_area" name="area"
               value="{{ projeto.area }}">
      </div>

      <div class="fg">
        <label for="id_status">Status</label>
        <select id="id_status" name="status">
          <option value="nao_iniciado"
            {% if projeto.status == "nao_iniciado" %}selected{% endif %}>
            Não iniciado
          </option>
          <option value="em_andamento"
            {% if projeto.status == "em_andamento" %}selected{% endif %}>
            Em andamento
          </option>
          <option value="concluido"
            {% if projeto.status == "concluido" %}selected{% endif %}>
            Concluído
          </option>
        </select>
      </div>

      <div class="fg">
        <label for="id_percentual">% concluído</label>
        <input type="number" id="id_percentual" name="percentual"
               min="0" max="100" step="0.1"
               value="{{ projeto.percentual }}">
      </div>

      <div class="fg">
        <label for="id_prazo">Prazo</label>
        <input type="date" id="id_prazo" name="prazo"
               value="{{ projeto.prazo }}">
      </div>

      <div class="fg">
        <label for="id_cor">Cor do card</label>
        <select id="id_cor" name="cor">
          <option value=""
            {% if not projeto.cor %}selected{% endif %}>
            Padrão
          </option>
          <option value="blue"
            {% if projeto.cor == "blue" %}selected{% endif %}>
            Azul
          </option>
          <option value="green"
            {% if projeto.cor == "green" %}selected{% endif %}>
            Verde
          </option>
          <option value="purple"
            {% if projeto.cor == "purple" %}selected{% endif %}>
            Roxo
          </option>
          <option value="orange"
            {% if projeto.cor == "orange" %}selected{% endif %}>
            Laranja
          </option>
          <option value="gray"
            {% if projeto.cor == "gray" %}selected{% endif %}>
            Cinza
          </option>
        </select>
      </div>
    </div>

    <div class="actions">
      <a href="{% url 'core:projetos_kanban' %}" class="btn-link">Cancelar</a>
      <button type="submit" class="btn">Salvar</button>
    </div>
  </form>
</div>
{% endblock %}
