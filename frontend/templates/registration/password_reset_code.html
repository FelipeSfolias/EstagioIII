{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <title>Verificar Código</title>
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="no-sidebar">
  <main class="auth-wrap">
    <form method="post" class="auth-card">
      {% csrf_token %}
      <h1>Verificar Código</h1>
      <p class="muted">Digite o código enviado e defina sua nova senha.</p>

      {% if messages %}
        {% for m in messages %}<div class="msg {{ m.tags }}">{{ m }}</div>{% endfor %}
      {% endif %}

      <label>Código (6 dígitos)</label>
      <input class="input" type="text" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required>

      <div class="grid-2">
        <div>
          <label>Nova senha</label>
          <input class="input" type="password" name="password1" autocomplete="new-password" required>
        </div>
        <div>
          <label>Confirmar nova senha</label>
          <input class="input" type="password" name="password2" autocomplete="new-password" required>
        </div>
      </div>

      <button class="btn btn-primary" type="submit" style="margin-top:12px">Salvar nova senha</button>

      <div class="form-help">
        <a href="{% url 'accounts:password_reset_start' %}" class="link">Reenviar código</a>
      </div>
    </form>
  </main>
</body>
</html>
