{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <title>Nova Senha — SIGCPC</title>
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="no-sidebar">
  <main class="login-wrap">
    <form method="post" class="card login-card">
      {% csrf_token %}
      <h1>Nova Senha</h1>
      <p class="subtitle">Defina sua nova senha de acesso ao sistema.</p>

      {% if messages %}
        {% for m in messages %}<div class="msg {{ m.tags }}">{{ m }}</div>{% endfor %}
      {% endif %}

      <label for="password1">Nova senha</label>
      <input id="password1" type="password" name="password1" autocomplete="new-password" minlength="8" required>

      <label for="password2">Confirmar nova senha</label>
      <input id="password2" type="password" name="password2" autocomplete="new-password" minlength="8" required>

      <button class="btn btn-primary" type="submit">Salvar nova senha</button>

      <div class="back-link">
        <a class="link" href="{% url 'accounts:login' %}">Voltar ao login</a>
      </div>
    </form>
  </main>

  <style>
    .login-wrap {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      background: #f3f5f8;
      padding: 24px;
    }
    .login-card {
      width: min(420px, 92vw);
      padding: 28px 28px 24px;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 10px 32px rgba(15, 23, 42, .1);
    }
    .login-card h1 {
      margin: 0 0 6px;
      font-size: 32px;
      color: #0f172a;
    }
    .login-card .subtitle {
      margin: 0 0 20px;
      color: #475569;
    }
    .login-card label {
      display: block;
      margin: 14px 0 6px;
      color: #0f172a;
      font-weight: 600;
    }
    .login-card input[type=password] {
      width: 100%;
      height: 44px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      background: #eef3ff;
      padding: 0 12px;
      font-size: 16px;
      box-sizing: border-box;
    }
    .login-card input[type=password]:focus {
      border-color: #0b132b;
      box-shadow: 0 0 0 3px rgba(11, 19, 43, .08);
      outline: 0;
    }
    .btn {
      width: 100%;
      height: 46px;
      border: 0;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
    }
    .btn-primary { background: #0b132b; color: #fff; }
    .btn-primary:hover { background: #1a2744; }
    .link { color: #1f51ff; text-decoration: none; font-size: 14px; }
    .back-link { margin-top: 14px; }
    .msg { padding: 8px 12px; border-radius: 8px; margin: 8px 0 0; font-size: 14px; }
    .msg.error { background: #fee2e2; color: #991b1b; }
    .msg.info { background: #e0f2fe; color: #0c4a6e; }
  </style>
</body>
</html>
