{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <title>Recuperar Senha</title>
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="no-sidebar">
  <main class="auth-wrap">
    <form method="post" class="auth-card">
      {% csrf_token %}
      <h1>Recuperar Senha</h1>
      <p class="muted">Informe seu e-mail para receber um código de verificação.</p>

      {% if messages %}
        {% for m in messages %}<div class="msg {{ m.tags }}">{{ m }}</div>{% endfor %}
      {% endif %}

      <div class="form-row">
        <input class="input grow" type="email" name="email" placeholder="seuemail@empresa.com" autocomplete="email" required>
        <button class="btn btn-primary" type="submit">Enviar código</button>
      </div>

      <div class="form-help">
        <a href="{% url 'accounts:login' %}" class="link">Voltar ao login</a>
      </div>
    </form>
  </main>
</body>
</html>
