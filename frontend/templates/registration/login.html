{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <title>Entrar</title>
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="no-sidebar">
  <main class="login-wrap">
    <form method="post" class="card login-card">
      {% csrf_token %}
      <h1>Acesso ao Sistema</h1>

      {% if form.errors %}
        <div class="msg error">Usuário ou senha inválidos.</div>
      {% endif %}

      <label>Usuário</label>
      <input type="text" name="username" autocomplete="username" required>

      <label>Senha</label>
      <input type="password" name="password" autocomplete="current-password" required>

      <div class="row-between">
        <label class="checkbox">
          <input type="checkbox" name="remember_me">
          <span>Lembrar senha</span>
        </label>

        <a class="link" href="{% url 'accounts:password_reset_start' %}">Esqueceu sua senha?</a>
      </div>

      {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}

      <button class="btn btn-primary" type="submit">Entrar</button>
    </form>
  </main>

  <style>
    .login-wrap{min-height:100dvh;display:grid;place-items:center;background:#f3f5f8;padding:24px}
    .login-card{width:min(420px,92vw);padding:28px 28px 24px;border-radius:18px;background:#fff;box-shadow:0 10px 32px rgba(15,23,42,.1)}
    .login-card h1{margin:0 0 18px;font-size:32px;color:#0f172a}
    .login-card label{display:block;margin:14px 0 6px;color:#0f172a;font-weight:600}
    .login-card input[type=text], .login-card input[type=password]{
      width:100%;height:44px;border-radius:10px;border:1px solid #e5e7eb;background:#eef3ff; padding:0 12px
    }
    .row-between{display:flex;justify-content:space-between;align-items:center;margin:12px 0 8px}
    .checkbox{display:flex;align-items:center;gap:8px;color:#0f172a}
    .link{color:#1f51ff;text-decoration:none}
    .btn{width:100%;height:46px;border:0;border-radius:12px;font-weight:700}
    .btn-primary{background:#0b132b;color:#fff}
    .msg.error{background:#fee2e2;color:#991b1b;padding:8px 12px;border-radius:8px;margin-top:8px}
  </style>
</body>
</html>
